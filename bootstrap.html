<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body, html {
        height: 100%;
        margin: 0;
      }
      /* Forzamos textos blancos en navegación */
      .navbar-nav .nav-link {
        color: white !important;
      }
      .navbar-nav .nav-link:hover {
        color: #ccc !important;
      }
      /* Color blanco para el icono de hamburguesa */
      .navbar-toggler {
        border-color: rgba(255, 255, 255, 0.5);
      }
      .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 1)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
      }
    </style>
  </head>
  <body class="text-white d-flex flex-column" style="background-color: rgb(12, 12, 12);">

    <nav class="navbar navbar-expand-lg p-3">
      <div class="container">
        <a class="navbar-brand p-0" href="#">
          <img src="img/logo.png" alt="Company Logo" style="width: 120px;">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mx-auto text-center">
            <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Features</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Pricing</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Support</a></li>
          </ul>
          <div class="d-flex justify-content-center">
            <button type="button" class="btn btn-outline-light">Start free trial</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center">
      <div class="container">
        <div class="row align-items-center">
          
          <div class="col-lg-6 text-center mb-5 mb-lg-0">
            <h1 class="display-1 fw-bold">404-error</h1>
            <h2 class="mb-4">PAGE NOT FOUND</h2>
            <p class="lead mb-4">Your search has ventured beyond the known universe.</p>
            <div class="d-grid gap-2 d-sm-block">
              <button type="button" class="btn btn-outline-light btn-lg px-5">Back To Home</button>
            </div>
          </div>
          
          <div class="col-lg-6">
            <div class="position-relative d-flex align-items-center justify-content-center">
              <div style="position: absolute; width: 300px; height: 300px; background: rgba(146, 86, 255, 0.4); filter: blur(80px); border-radius: 50%; z-index: 0;"></div>
              <img src="img/lord.png" alt="Error 404 Illustration" class="img-fluid" style="position: relative; z-index: 1; filter: drop-shadow(0 0 20px rgba(0, 198, 255, 0.2)); max-width: 450px;">
            </div>
          </div>
    
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
